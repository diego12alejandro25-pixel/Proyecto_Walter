<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Examen Peliculas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container mt-4">

        <h2 class="text-center mb-4">Test De Peliculas</h2>

        <div class="row g-2">

            <div class="col-md-3">
                <input type="number" id="buscarId" class="form-control" placeholder="Buscar por ID">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="buscarPorId()">Buscar</button>
            </div>

            <div class="col-md-3">
                <select id="genero" class="form-select">
                    <option value="">Todos los generos</option>
                    <option>Drama</option>
                    <option>Romance</option>
                    <option>Documentary</option>
                    <option>Horror</option>
                    <option>Comedy</option>
                    <option>Thriller</option>
                </select>
            </div>

            <div class="col-md-2">
                <button class="btn btn-success w-100" onclick="filtrar()">
                    Filtrar
                </button>
            </div>

            <div class="col-md-2">
                <button class="btn btn-warning w-100" onclick="mayores()">
                    ≥ 5
                </button>
            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-8">
                <input type="text" id="buscarnombre" class="form-control" placeholder="Buscar por nombre">
            </div>

            <div class="col-md-2">
                <button class="btn btn-info w-100" onclick="buscarnombre()">
                    Buscar
                </button>
            </div>

            <div class="col-md-2">
                <button class="btn btn-danger w-100" onclick="actualizar()">
                    Actualizar
                </button>
            </div>

        </div>

        <table class="table table-bordered table-striped mt-4">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Titulo</th>
                    <th>Género</th>
                    <th>Calificacion</th>
                </tr>
            </thead>

            <tbody id="tablaPeliculas"></tbody>

        </table>

    </div>

    <script src="app.js"></script>

</body>

</html>
